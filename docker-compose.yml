version: "3.8"

services:
  nordvpn:
    # network: host beim BUILD (nicht Laufzeit!): das Docker-Bridge-Build-Netz
    # auf der Synology hat unzuverlaessiges DNS -> apt-get update scheitert.
    # Der Host loest sauber auf. Laufzeit-Netz bleibt unveraendert (eigener
    # Namespace mit VPN). Belegfall 2026-06-30.
    build:
      context: ./nordvpn
      network: host
    container_name: nordvpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      - NORDVPN_COUNTRY=Netherlands
    dns:
      - 8.8.8.8
      - 1.1.1.1
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    mem_limit: 512m
    # Haerter Tunnel-Check (2026-06-30): Der alte Check `curl ifconfig.me`
    # bewies nur "Internet erreichbar" — er war heute GRUEN, obwohl der
    # VPN-Daemon tot und der Tunnel weg war (Traffic lief ueber die
    # Bridge-Route). Jetzt wird der echte VPN-Status geprueft: "Connected".
    # WICHTIG: `^Status: Connected` praezise verankert + LC_ALL=C — ein
    # blosses grep "Connected" wuerde auch "Disconnected" als Substring
    # matchen (Cross-Review-MUSS 2026-06-30). start_period grosszuegig,
    # damit der initiale Daemon-Start + Login + Connect nicht verfrueht als
    # unhealthy gilt (sonst Deadlock fuer die service_healthy-gegateten
    # kali/cloudbot). interval/retries kuerzer fuer schnellere Erkennung.
    healthcheck:
      test: ["CMD-SHELL", "LC_ALL=C nordvpn status 2>/dev/null | grep -qE '^Status: Connected' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  kali:
    build: ./kali
    container_name: kali
    restart: unless-stopped
    stdin_open: true
    tty: true
    cap_add:
      - NET_RAW
      - NET_ADMIN
    network_mode: service:nordvpn
    depends_on:
      nordvpn:
        condition: service_healthy
    volumes:
      - kali-data:/root/data
    tmpfs:
      - /tmp:size=100M
      - /run:size=10M
    mem_limit: 2g

  cloudbot:
    build:
      context: ./cloudbot
      network: host
    container_name: cloudbot
    restart: unless-stopped
    network_mode: service:nordvpn
    depends_on:
      nordvpn:
        condition: service_healthy
      cloudbot-claude:
        condition: service_healthy
      cloudbot-docker-broker:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - CLAUDE_CODE_MODEL=claude-sonnet-5
    volumes:
      - bot-logs:/app/logs
      - claude-ipc:/run/claude-ipc
      - docker-broker-ipc:/run/docker-broker
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  cloudbot-claude:
    build:
      context: ./cloudbot
      dockerfile: Dockerfile.claude
      network: host
    container_name: cloudbot-claude
    restart: unless-stopped
    network_mode: service:nordvpn
    depends_on:
      nordvpn:
        condition: service_healthy
    volumes:
      - claude-auth:/root/.claude
      - claude-ipc:/run/claude-ipc
    tmpfs:
      - /tmp:size=100M
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(socket.AF_UNIX); s.settimeout(2); s.connect('/run/claude-ipc/claude.sock'); s.sendall(b'{\"action\":\"auth_status\"}\\n'); assert b'\"ok\":true' in s.recv(4096)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  cloudbot-docker-broker:
    build:
      context: ./cloudbot
      dockerfile: Dockerfile.broker
    container_name: cloudbot-docker-broker
    restart: unless-stopped
    network_mode: none
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - docker-broker-ipc:/run/docker-broker
    tmpfs:
      - /tmp:size=10M
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(socket.AF_UNIX); s.settimeout(2); s.connect('/run/docker-broker/broker.sock'); s.sendall(b'{\"operation\":\"list_containers\",\"params\":{}}\\n'); assert b'\"ok\":true' in s.recv(65536)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  kali-data:
  bot-logs:
  claude-auth:
  claude-ipc:
  docker-broker-ipc:
